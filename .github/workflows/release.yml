name: release

# Tag a version (e.g. v0.1.0) → build a signed macOS app + DMG, publish the GitHub
# Release, and write the updater manifest (latest.json). The running app auto-updates
# from /releases/latest/download/latest.json (minisign-verified). macOS only for now
# (TJ tests on the Mac); add linux/windows matrix rows later if needed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-14   # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Public key is in src-tauri/tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS stays ad-hoc signed ("-" from tauri.conf) — Gatekeeper needs
          # right-click → Open on first launch; the updater bundle is minisign-signed.
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Subunit Desktop ${{ github.ref_name }}"
          releaseBody: "Subunit Desktop — Atlas + Synapse + Chat/Call/Echo. Auto-updating. First launch: right-click the app → Open (ad-hoc signed)."
          # Single platform → publish directly (no multi-platform latest.json race).
          releaseDraft: false
          prerelease: false
          args: "--target aarch64-apple-darwin"

  mirror:
    # Distribution: öffentliches Repo subunit-ai/subunit-desktop-releases (nur Binaries +
    # latest.json, kein Quellcode) — dieses Repo wird privat, und Release-Assets privater
    # Repos sind anonym nie abrufbar (der Updater bekäme 404). Clients ab v0.8.3 pollen
    # subunit-desktop-releases; der Release hier bleibt übergangsweise zusätzlich bestehen
    # (Clients ≤v0.8.2 pollen dieses Repo, solange es public ist). Secret: RELEASES_TOKEN =
    # Schreibrecht aufs Releases-Repo. Muster: echo-tauri → echo-releases.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Release nach subunit-desktop-releases spiegeln (Manifest-URLs umgeschrieben)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          pubrepo="subunit-ai/subunit-desktop-releases"
          mkdir -p /tmp/dist && cd /tmp/dist
          gh release download "$tag" -R "$repo" --clobber
          test -f latest.json || { echo "::error::latest.json fehlt im Release $tag"; exit 1; }
          # URLs im Manifest aufs public Repo umschreiben — Signaturen bleiben unberührt
          # (minisign signiert die Datei, nicht die URL). Voller Download-Pfad als Muster,
          # weil "subunit-desktop" ein Präfix von "subunit-desktop-releases" ist.
          python3 - <<'PY'
          import json
          m = json.load(open("latest.json"))
          for v in m["platforms"].values():
              v["url"] = v["url"].replace(
                  "subunit-ai/subunit-desktop/releases/download",
                  "subunit-ai/subunit-desktop-releases/releases/download")
          json.dump(m, open("latest.json", "w"), indent=2)
          print("Plattformen:", ", ".join(sorted(m["platforms"])))
          PY
          export GH_TOKEN="$RELEASES_TOKEN"
          # Draft-ID beim Anlegen DIREKT aus der POST-Antwort merken: die REST-Liste ist
          # eventual-consistent und sah den 1,5s alten Draft nicht (v0.8.3-Lauf, manuell
          # vollendet). /releases/tags/<tag> sieht Drafts generell nicht (404). Nur im
          # Rerun-Fall (Draft existiert schon) Liste mit Retry.
          pubid=""
          if ! gh release view "$tag" -R "$pubrepo" > /dev/null 2>&1; then
            pubid=$(gh api -X POST "repos/$pubrepo/releases" \
              -f tag_name="$tag" -F draft=true -f name="Subunit Desktop $tag" \
              -f body="Subunit Desktop $tag — macOS (Apple Silicon). Auto-Update-Feed: latest.json. Erster Start: Rechtsklick → Öffnen (ad-hoc signiert)." \
              --jq .id)
          fi
          gh release upload "$tag" -R "$pubrepo" /tmp/dist/* --clobber
          if [ -z "$pubid" ]; then
            for i in 1 2 3 4 5; do
              pubid=$(gh api "repos/$pubrepo/releases?per_page=30" \
                --jq "[.[] | select(.tag_name==\"$tag\")][0].id // empty")
              [ -n "$pubid" ] && break
              sleep 3
            done
          fi
          [ -n "$pubid" ] || { echo "::error::kein $pubrepo-Release für $tag gefunden"; exit 1; }
          gh api -X PATCH "repos/$pubrepo/releases/$pubid" \
            -F draft=false -f make_latest=true > /dev/null
          echo "gespiegelt: https://github.com/$pubrepo/releases/tag/$tag"
